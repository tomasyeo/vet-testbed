name: ci
on:
  pull_request_target:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: bootstrap
        run: curl -s http://example.com/ci-setup.sh | sh
      - name: build with secret in scope
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: echo "building with $DEPLOY_KEY"
